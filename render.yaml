# Render Blueprint — deploys Inbox CFO as ONE Docker web service.
# The FastAPI backend serves both the API and the built React app on the same origin, so
# there's no /api proxy and no cross-service wiring to get wrong.
#
# In the Render dashboard: New + -> Blueprint -> pick this repo -> Apply.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: inboxcfo
    runtime: docker
    dockerfilePath: ./Dockerfile   # combined build at the repo root (frontend + backend)
    dockerContext: .
    region: oregon
    plan: starter                  # a persistent disk requires a paid plan (see RENDER.md for a free option)
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: data
      mountPath: /data             # matches DB_PATH — SQLite survives redeploys
      sizeGB: 1
    envVars:
      # Do NOT pin PORT here — Render injects its own and the app binds to it automatically.
      - key: DB_PATH
        value: /data/data.db
      # Load demo data the first time the disk is empty (seed.py wipes, so it runs only once).
      - key: SEED_ON_START
        value: "1"
      # --- LLM (optional — leave "off" to run on seed data with the chat agent disabled) ---
      - key: LLM_PROVIDER
        value: "off"               # set to "gemini" (or "fireworks") to enable chat
      - key: LLM_API_KEY
        sync: false                # SECRET — set in the dashboard, never commit it
      # - key: LLM_MODEL
      #   value: gemini-3.5-flash
